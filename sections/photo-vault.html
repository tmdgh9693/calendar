<section class="tab hidden" id="photoVault">
  <div class="card photo-vault-card">
    <div class="photo-vault-head">
      <div>
        <h2>사진 보관함</h2>
        <p class="small">사진을 올리면 원본과 자동 압축본이 Cloud Firestore에 저장됩니다. 같은 이메일 계정으로 로그인한 휴대폰과 컴퓨터에서 실시간으로 함께 표시하고 다운로드할 수 있습니다.</p>
      </div>
      <button class="s" id="photoVaultRefreshBtn" type="button">새로고침</button>
    </div>

    <div class="photo-vault-upload">
      <label for="photoVaultUpload"><strong>사진 올리기</strong></label>
      <input id="photoVaultUpload" type="file" accept="image/*" multiple>
      <input id="photoVaultOriginalRepairInput" type="file" accept="image/*" hidden>
      <p class="small">원본은 여러 조각으로 나누고, 압축본은 미리보기용으로 저장합니다. 기존에 압축본만 저장된 사진은 카드의 “원본 다시 연결”에서 원본 파일을 선택하면 이후 모든 기기에서 원본 다운로드가 가능합니다. 사진 한 장당 원본은 15MB 이하만 올릴 수 있습니다.</p>
    </div>

    <div class="photo-vault-options">
      <strong>사진 다운로드·삭제</strong>
      <label for="photoVaultBulkDownloadType" class="photo-vault-download-type">선택 다운로드 종류
        <select id="photoVaultBulkDownloadType">
          <option value="original">원본 사진</option>
          <option value="compressed">압축 사진</option>
        </select>
      </label>
      <span class="small">여러 장은 ZIP 파일 한 개로 내려받습니다.</span>
    </div>

    <div class="photo-vault-toolbar">
      <button class="s" id="photoVaultSelectAllBtn" type="button">전체 선택</button>
      <button class="s" id="photoVaultClearSelectionBtn" type="button">선택 해제</button>
      <button class="g" id="photoVaultDownloadSelectedBtn" type="button">선택 다운로드</button>
      <button class="d" id="photoVaultDeleteSelectedBtn" type="button">선택 삭제</button>
      <span id="photoVaultSelectedCount" class="small">0장 선택</span>
    </div>

    <div id="photoVaultStatus" class="small" aria-live="polite"></div>
    <div id="photoVaultList" class="photo-vault-list"></div>
  </div>
</section>
