<section id="dept" class="tab hidden">
  <div class="card notice">
    과 캘린더는 과 공통 일정입니다. 개인 일정에서 “과 캘린더 반영”을 체크하면 자동 반영됩니다.
  </div>
  <div class="card">
    <h2>과 캘린더 회의자료 생성</h2>

    <div class="grid4">

    <div>
    <label>실적 시작일</label>
    <input id="deptStart" type="date">
    </div> 
    <div>
    <label>실적 종료일</label>
    <input id="deptEnd" type="date">
    </div>
    <div>
    <label>계획 시작일</label>
    <input id="deptPlanStart" type="date">
    </div>
    <div>
    <label>계획 종료일</label>
    <input id="deptPlanEnd" type="date">
    </div>
    </div>

    <button class="p" onclick="makeDeptMeetingCustom('weekly')">
      주간 회의자료 생성
    </button>

    <button class="g" onclick="makeDeptMeetingCustom('monthly')">
      월간 회의자료 생성
    </button>

    <button class="s" onclick="saveGenerated('회의자료','deptMeetingReport')">
    생성자료 보관
    </button>

    <button class="s" onclick="printOnly('deptMeetingReport')">
    생성자료만 인쇄/PDF
    </button>

    <div id ="deptMeetingReport" class="reportbox">
      <h1>항행정보시설과</h1>
      <p class="small">
        날짜를 지정하고 회의자료 생성 버튼을 누르세요.
      </p>
    </div>
    </div>
    <div class="card">
    <div class="cal-head">
      <button class="s" onclick="moveMonth(-1)">
        ◀
      </button>
      <h2 id="deptTitle">

      </h2>
      <button class="s" onclick="moveMonth(1)">
        ▶
      </button>
    </div>
    <div id="deptCal" class="cal">

    </div>
  </div>
</section>
