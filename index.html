<body class="theme-personal app-booting">

<div class="hidden" id="login">
<div class="box">
<h2>개인 캘린더 만들기</h2>
<p class="small">
        이메일로 로그인하면 모바일·컴퓨터에서 같은 개인 캘린더를 볼 수 있습니다.
        과 일정은 로그인한 모든 사용자에게 실시간 공유됩니다.
      </p>
<label>이름</label>
<input id="loginName" placeholder="예: 홍길동"/>
<label>직급</label>
<input id="loginRank" placeholder="예: 해양수산주사"/>
<label>이메일</label>
<input id="loginEmail" placeholder="example@email.com" type="email"/>
<label>비밀번호</label>
<input id="loginPassword" placeholder="6자리 이상" type="password"/>
<label for="loginColor">내 일정 표시 색상</label>
<div class="login-color-row">
<input aria-label="로그인 시 내 일정 표시 색상" id="loginColor" type="color" value="#2563eb"/>
<span class="small">로그인 후 설정 메뉴에서 언제든 다시 변경할 수 있습니다.</span>
</div>
<button class="p" id="loginBtn" onclick="login()">로그인 / 회원가입</button>
</div>
</div>

<div class="hidden" id="modal">
<div class="box event-modal-box">
<div class="event-modal-head">
<h2 id="modalTitle">일정 등록</h2>
<button aria-label="닫기" class="event-modal-close" onclick="closeModal()" type="button">×</button>
</div>
<input id="evId" type="hidden"/>
<input id="evScope" type="hidden"/>
<div class="event-compact-form">
<div class="event-row event-row-two">
<div class="event-field">
<label for="evType">유형</label>
<select id="evType">
<option>회의</option>
<option>출장</option>
<option>점검</option>
<option>공사</option>
<option>보고</option>
<option>행사</option>
<option>기타</option>
</select>
</div>
<div class="event-field">
<label for="evPerson">담당자</label>
<input autocomplete="name" id="evPerson" list="eventUserNames" oninput="autofillEventMainRank(this.value)"/>
</div>
</div>
<div class="event-people-box" id="evPeopleBox">
  <div class="event-people-head">
    <strong>추가 참여 인원</strong>
    <button class="s" onclick="addEventPerson()" type="button">인원 추가</button>
  </div>
  <datalist id="eventUserNames"></datalist>
  <div class="event-people-list" id="evPeopleList"></div>
  <p class="small">함께 참여하는 사람이 있으면 직급과 성명을 추가하세요.</p>
</div>
<div class="event-row event-row-time">
<div class="event-field event-date-field">
<label for="evDate">시작일정</label>
<input id="evDate" type="date"/>
</div>
<div class="event-field event-time-field">
<label for="evStartH">시작 시</label>
<select id="evStartH"></select>
</div>
<div class="event-field event-time-field">
<label for="evStartM">시작 분</label>
<select id="evStartM"></select>
</div>
</div>
<div class="event-row event-row-time">
<div class="event-field event-date-field">
<label for="evEndDate">종료일정</label>
<input id="evEndDate" type="date"/>
</div>
<div class="event-field event-time-field">
<label for="evEndH">종료 시</label>
<select id="evEndH"></select>
</div>
<div class="event-field event-time-field">
<label for="evEndM">종료 분</label>
<select id="evEndM"></select>
</div>
</div>
<div class="event-field event-full-field">
<label for="evTitle">일정명</label>
<input id="evTitle" placeholder="일정명을 입력하세요"/>
</div>
<div class="event-field event-full-field">
<label for="evPlace">장소</label>
<input id="evPlace" placeholder="장소를 입력하세요"/>
</div>
<div class="event-completion-row hidden" id="evCompletionRow">
<label class="event-completion-check" for="evWorkCompleted">
<input id="evWorkCompleted" type="checkbox"/>
<span class="event-completion-text">
<strong>일정 완료</strong>
<small>내 캘린더에서 완료 여부를 체크하고 상태를 확인할 수 있습니다.</small>
</span>
</label>
</div>
</div>
<details class="event-extra-settings">
<summary>과 공유·회의자료 설정</summary>
<div class="event-extra-body">
<div class="grid3">
<label class="event-check-label">
<input id="evDeptReflect" type="checkbox"/>
              과 캘린더 반영
            </label>
<label class="event-check-label">
<input id="evMeetingInclude" type="checkbox"/>
              회의자료 반영
            </label>
<div>
<label for="evPart">회의자료 위치</label>
<select id="evPart">
<option value="자동">자동</option>
<option value="성과">실적</option>
<option value="계획">계획</option>
<option value="현안">현안·협조사항</option>
</select>
</div>
</div>
<label for="evSummary">핵심문장</label>
<textarea id="evSummary"></textarea>
<label for="evResult">결과·조치사항</label>
<textarea id="evResult"></textarea>
<label for="evPlan">향후계획·협조사항</label>
<textarea id="evPlan"></textarea>
</div>
</details>
<div class="event-modal-actions">
<button class="p" id="saveEventBtn" onclick="saveEvent()">저장</button>
<button class="s" onclick="closeModal()">닫기</button>
<button class="d" id="deleteEventBtn" onclick="deleteEvent()">삭제</button>
</div>
</div>
</div>


<div class="hidden decision-modal" id="decisionModal" role="dialog" aria-modal="true" aria-labelledby="decisionTitle">
  <div class="box decision-modal-box">
    <h2 id="decisionTitle">확인</h2>
    <p id="decisionMessage"></p>
    <div class="decision-modal-actions">
      <button class="p" id="decisionYesBtn" type="button">네</button>
      <button class="s" id="decisionNoBtn" type="button">아니요</button>
    </div>
  </div>
</div>
<header class="main-header no-print">
<div class="header-bar">
<button aria-label="내 캘린더로 이동" class="brand-button" data-tab="personal" onclick="tab('personal', this)" type="button">
<img alt="과 캘린더 로고" decoding="sync" height="42" src="./img/logo.png" width="180"/>
<span class="brand-name">개인·과 캘린더</span>
</button>
<div class="user-area">
<button aria-expanded="false" class="user-profile-button" onclick="toggleUserMenu(event)" type="button">
<img alt="프로필" decoding="sync" height="38" src="./img/profile.png" width="38"/>
<span id="who">미로그인</span>
<span id="connectionStatus" class="connection-status" aria-live="polite">상태 확인 중</span>
</button>
<ul class="user-menu hidden" id="userMenu">
<li><button class="dropdown-item" onclick="logout()" type="button">로그아웃</button></li>
</ul>
</div>
</div>
